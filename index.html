<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>gusta.handicraft｜Travel Yarn 團購</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
emailjs.init("Bv3jNth_VV48IwhIK");
</script>

<style>
body {
  font-family: "Outfit", "Noto Sans TC", sans-serif;
  background: linear-gradient(#f8f3ed, #efe7dc);
  padding: 28px;
  color: #5c4b3b;
}
.grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:18px; }
.card { background:white; padding:14px; border-radius:16px; }
.qty-btn { width:40px;height:40px;border:none;border-radius:50%;background:#e7d7c7; }
.product-img { width:100%; aspect-ratio:1/1; object-fit:cover; border-radius:14px; }
.cart { margin-top:20px; background:white; padding:18px; border-radius:16px; }
button.submit { width:100%; padding:14px; background:#cbb59b; border:none; color:white; border-radius:12px; }
</style>
</head>

<body>

<h1>🧵 gusta.handicraft</h1>

<h3>📦 查詢訂單</h3>
<input id="searchName" placeholder="輸入LINE暱稱 / Email / 訂單編號">
<button class="submit" onclick="searchOrder()">查詢</button>
<ul id="result"></ul>

<div class="grid" id="products"></div>

<div class="cart">
<h3>🛒 購物車</h3>
<ul id="cart"></ul>
<p id="total">總金額 $0</p>
<button class="submit" onclick="submitOrder()">送出訂單</button>
</div>

<script>

// Firebase
const firebaseConfig = {
  apiKey: "AIzaSyDm6qL6HhI_6nv0Uahrb6RqVFh0V7nI000",
  authDomain: "gusta-handicraft-91753.firebaseapp.com",
  projectId: "gusta-handicraft-91753"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// 商品
let products = [];
let cart = {};

// Google Sheet 商品
fetch("https://script.google.com/macros/s/AKfycbxWYRimY_Ald1aUueGV74d39rHgmM_V-p-vOOnry8dQBgGGDt8KcX66wYZWRHhrTP39/exec")
.then(res => res.json())
.then(data => {

  products = Array.isArray(data) ? data.filter(p => p.status === "on") : [];

  renderProducts();
  listenTotal();
  updateGroupStatus();

});

// ===== 工具 =====
function formatTime(t){
  const time = t?.seconds ? new Date(t.seconds*1000) : new Date(t);
  return time.toLocaleString();
}

// ===== 商品 =====
function renderProducts(){
  const el = document.getElementById("products");

  products.forEach(p=>{
    const div = document.createElement("div");
    div.className="card";

    div.innerHTML=`
      <img src="${p.img}" class="product-img">
      <div>${p.name}</div>
      <p>$${p.price}</p>

      <div id="status-${p.id}">載入中...</div>

      <div>
        <button class="qty-btn" onclick="changeQty('${p.id}',-1)">-</button>
        <span id="qty-${p.id}">0</span>
        <button class="qty-btn" onclick="changeQty('${p.id}',1)">+</button>
      </div>
    `;

    el.appendChild(div);
  });
}

function changeQty(id,delta){
  const el = document.getElementById("qty-"+id);
  let v = parseInt(el.textContent);
  v = Math.max(0, v + delta);
  el.textContent = v;
  updateCart();
}

// ===== 購物車 =====
function updateCart(){
  cart = {};
  let total = 0;

  products.forEach(p=>{
    const qtyEl = document.getElementById("qty-"+p.id);
    if(!qtyEl) return;

    const qty = parseInt(qtyEl.textContent || 0);

    if(qty > 0){
      cart[p.id] = qty;
      total += qty * Number(p.price);
    }
  });

  const el = document.getElementById("cart");
  el.innerHTML="";

  Object.keys(cart).forEach(id=>{
    const p = products.find(x=>x.id===id);
    if(!p) return;

    const li = document.createElement("li");
    li.textContent = `${p.name} x ${cart[id]}`;
    el.appendChild(li);
  });

  document.getElementById("total").textContent = "總金額 $" + total;
}

// ===== 訂單 =====
function submitOrder(){

  const name = document.getElementById("name")?.value || "";
  const ig = document.getElementById("ig")?.value || "";
  const email = document.getElementById("email")?.value || "";

  if(!name || !ig || !email){
    alert("請填完整資料");
    return;
  }

  if(Object.keys(cart).length === 0){
    alert("請選商品");
    return;
  }

  const orderId = "TY"+Date.now();

  db.collection("orders").add({
    orderId,
    name,
    ig,
    email,
    cart,
    status:"未出貨",
    created:new Date()
  });

  alert("已送出訂單："+orderId);
}

// ===== 查詢（已修好）=====
function searchOrder(){

  const input = document.getElementById("searchName").value;
  const el = document.getElementById("result");
  el.innerHTML="";

  db.collection("orders").get().then(snapshot=>{

    snapshot.forEach(doc=>{
      const d = doc.data();

      if(
        d.name===input ||
        d.email===input ||
        d.orderId===input
      ){

        const li = document.createElement("li");

        const items = Object.entries(d.cart || {}).map(i=>{
          const p = products.find(x=>x.id===i[0]);
          return (p? p.name : i[0]) + " x " + i[1];
        }).join(", ");

        li.textContent = `${d.orderId}｜${items}`;
        el.appendChild(li);
      }
    });
  });
}

// ===== 成團統計 =====
function listenTotal(){

  db.collection("orders").onSnapshot(snapshot=>{

    let totals={};

    snapshot.forEach(doc=>{
      const cart = doc.data().cart || {};
      Object.entries(cart).forEach(([k,v])=>{
        totals[k] = (totals[k]||0)+v;
      });
    });

    products.forEach(p=>{
      const el = document.getElementById("status-"+p.id);
      if(!el) return;

      const total = totals[p.id] || 0;

      el.textContent =
        total >= 6 ? "✨ 已成團" : "等待成團 🧶";
    });
  });
}

// ===== 成團狀態 =====
async function updateGroupStatus(){

  const snap = await db.collection("orders").get();
  let totals={};

  products.forEach(p=> totals[p.id]=0);

  snap.forEach(doc=>{
    const cart = doc.data().cart || {};

    Object.entries(cart).forEach(([id,qty])=>{
      if(totals[id]!==undefined){
        totals[id]+=qty;
      }
    });
  });

  products.forEach(p=>{
    const el = document.getElementById("status-"+p.id);
    if(!el) return;

    el.textContent =
      totals[p.id] >= 6 ? "✨ 已達成團門檻" : "等待更多旅伴 🧶";
  });
}

</script>

</body>
</html>
