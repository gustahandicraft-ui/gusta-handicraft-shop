<html lang="zh-TW">
<head>

emailjs.init("Bv3jNth_VV48IwhIK");

<meta charset="UTF-8">

<style>
body {
  font-family: "Helvetica";

h1 {
  margin-bottom: 10px;

<body onload="checkPassword()">
<h1>🧵 gusta.handicraft｜訂單後台</h1>

<div class="stats">
<button onclick="exportCSV()">匯出訂單 CSV</button>
  <h3>📊 團購統計</h3>
  <p id="totalOrders">訂單數：0</p>
  <ul id="productStats"></ul>
</div>
<div style="margin-bottom:15px;">
  <input id="searchOrder" placeholder="搜尋姓名 / Email / 訂單編號"
    style="padding:8px;width:100%;border-radius:8px;border:1px solid #ccc;">
</div>


<div id="orders"></div>

<script>
// 🔥 Firebase（填你的）
const firebaseConfig = {
  apiKey: "AIzaSyDm6qL6HhI_6nv0Uahrb6RqVFh0V7nI000",
  authDomain: "gusta-handicraft-91753.firebaseapp.com",
  projectId: "gusta-handicraft-91753"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

function formatTime(created){
  const time = created?.seconds
    ? new Date(created.seconds * 1000)
    : new Date(created);

  return time.toLocaleString();
}

// 即時監聽訂單
db.collection("orders").orderBy("created","desc")
.onSnapshot(snapshot => {

  const container = document.getElementById("orders");
  const statsEl = document.getElementById("productStats");

  container.innerHTML = "";
  statsEl.innerHTML = "";

  let totalOrders = 0;
  let productStats = {};

  snapshot.forEach(doc => {
    totalOrders++;

    const d = doc.data();

    // 統計商品
    for (let key in (d.cart || {})) {
      productStats[key] = (productStats[key] || 0) + d.cart[key];
    }

    const div = document.createElement("div");
    div.className = "card";

div.innerHTML = `
  <b>${d.orderId}</b><br>
  ${d.name}（${d.email}）<br>
🧶 ${
Object.entries(d.cart || {}).length
  ? Object.entries(d.cart || {}).map(i=>{
      const productNames = {
        "001_London":"001 London Lace",
        "001_LondonSuriSilkCloud":"001 London Suri Silk Cloud",
        "002_Minneapolis":"002 Minneapolis",
        "003_Praha":"003 Praha",
        "004_Bukchon":"004 Bukchon",
        "005_Toronto_Lace":"005 Toronto Lace",
        "005_Toronto_Mohair":"005 Toronto Mohair",
        "006_Grampians":"006 Grampians"
      };

      return (productNames[i[0]] || i[0]) + " x " + i[1];

    }).join(", ")
  : "（無商品）"
}
  📦 狀態：${d.status}<br>
  📨 修改需求：${d.request}<br>
  🕒 ${formatTime(d.created)}<br>

  <button onclick="updateStatus('${doc.id}', '已出貨')">
    標記已出貨
  </button>

  <button onclick="updateStatus('${doc.id}', '已完成')">
    標記完成
  </button>
`;

    container.appendChild(div);
  });

  // 更新統計
  document.getElementById("totalOrders").textContent =
    "訂單數：" + totalOrders;

  Object.keys(productStats).forEach(name=>{
    const li = document.createElement("li");
    li.textContent = `${name}：${productStats[name]} 顆`;
    statsEl.appendChild(li);
  });

});
function sendStatusEmail(orderId, name, email, status){

  emailjs.send(
    "service_hc29cbj",
    "template_status",
    {
      order_id: orderId,
      to_name: name,
      to_email: email,
      status: status
    }
  ).catch(err => {
    console.log("Email error:", err);
  });

}

function updateStatus(id, status){

  db.collection("orders").doc(id).update({
    status: status
  });

  // 👉 半自動通知
  db.collection("orders").doc(id).get().then(doc=>{
    const d = doc.data();

    sendStatusEmail(
      d.orderId,
      d.name,
      d.email,
      status
    );
  });
}
// 📊 匯出CSV
function exportCSV(){

  db.collection("orders").get().then(snapshot=>{

    let csv = [];

    // 標題列
    csv.push([
      "姓名",
      "IG",
      "商品",
      "數量",
      "狀態",
      "時間"
    ]);

    snapshot.forEach(doc=>{

      const d = doc.data();

      Object.entries(d.cart).forEach(item=>{

        csv.push([
          d.name,
          d.ig,
          item[0],
          item[1],
          d.status,
          formatTime(d.created)
        ]);

      });

    });

    // 轉CSV
    const csvContent =
      "\uFEFF" +
      csv.map(e => e.join(",")).join("\n");

    const blob = new Blob(
      [csvContent],
      { type: "text/csv;charset=utf-8;" }
    );

    const link = document.createElement("a");

    link.href = URL.createObjectURL(blob);

    link.download = "gusta_orders.csv";

    link.click();

  });

}

function checkPassword(){

  const password = prompt("請輸入後台密碼");

  // 👉 改成你自己的密碼
  const adminPassword = "gusta6633";

  if(password !== adminPassword){
    alert("密碼錯誤");
    document.body.innerHTML = "";
  }
}
</script>

</body>
</html>
