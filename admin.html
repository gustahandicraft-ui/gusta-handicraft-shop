function sendStatusEmail(orderId, name, email, status){

  emailjs.send(
    "service_hc29cbj",
    "template_status",
    {
      order_id: orderId,
      to_name: name,
      to_email: email,
      status: status
    }
  );

}

function updateStatus(id, status){

  db.collection("orders")
    .doc(id)
    .update({
      status: status
    });

  db.collection("orders")
    .doc(id)
    .get()
    .then(doc => {

      const d = doc.data();

      sendStatusEmail(
        d.orderId,
        d.name,
        d.email,
        status
      );

    });

}

function exportCSV(){

  db.collection("orders")
  .get()
  .then(snapshot => {

    let csv = [];

    csv.push([
      "姓名",
      "IG",
      "商品",
      "數量",
      "狀態",
      "時間"
    ]);

    snapshot.forEach(doc => {

      const d = doc.data();

      Object.entries(d.cart || {}).forEach(item => {

        csv.push([
          d.name,
          d.ig,
          item[0],
          item[1],
          d.status,
          formatTime(d.created)
        ]);

      });

    });

    const csvContent =
      "\uFEFF" +
      csv.map(e => e.join(",")).join("\n");

    const blob = new Blob(
      [csvContent],
      { type: "text/csv;charset=utf-8;" }
    );

    const link = document.createElement("a");

    link.href = URL.createObjectURL(blob);

    link.download = "gusta_orders.csv";

    link.click();

  });

}

function searchAdminOrder(){

  const keyword =

    .value
    .trim();

  if(!keyword){
    alert("請輸入搜尋內容");
    return;
  }

  const cards = document.querySelectorAll(".card");

  cards.forEach(card => {

    const text = card.textContent;

    card.style.display =
      text.includes(keyword)
        ? "block"
        : "none";

  });

}

function clearAdminSearch(){

  document.getElementById("searchOrder").value = "";

  const cards = document.querySelectorAll(".card");

  cards.forEach(card => {
    card.style.display = "block";

}

function replyRequest(id){
